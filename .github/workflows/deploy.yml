name: CI/CD

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/unimaintain_test
      JWT_SECRET: test-jwt-secret-for-ci
      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY: test
      CLOUDINARY_API_SECRET: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm --workspace backend exec prisma generate
      - run: npm run test:backend
      - run: npm run test:frontend

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute Docker tag from branch
        id: branch
        run: |
          branch_name=${GITHUB_REF#refs/heads/}
          branch_tag=${branch_name//\//-}
          if [ "$branch_tag" = "main" ]; then
            branch_tag=latest
          fi
          echo "branch_tag=$branch_tag" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/unimaintain-backend:${{ steps.branch.outputs.branch_tag }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/unimaintain-frontend:${{ steps.branch.outputs.branch_tag }}

  deploy:
    needs: docker
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render staging deploy
        if: github.ref == 'refs/heads/staging'
        run: |
          curl -s "${{ secrets.RENDER_BACKEND_STAGING_HOOK }}"
          curl -s "${{ secrets.RENDER_FRONTEND_STAGING_HOOK }}"

      - name: Trigger Render production deploy
        if: github.ref == 'refs/heads/main'
        run: |
          curl -s "${{ secrets.RENDER_BACKEND_PROD_HOOK }}"
          curl -s "${{ secrets.RENDER_FRONTEND_PROD_HOOK }}"
