version: '3.9'
services:
  db:
    image: postgres:15-alpine
    env_file: .env
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file: .env
    ports:
      - '4000:4000'
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    env_file: .env
    ports:
      - '4173:4173'
    depends_on:
      - backend

volumes:
  db_data:
