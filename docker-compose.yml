services:
  db:
    image: postgres:15-alpine
    env_file: .env
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    ports:
      - '4000:4000'
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - '80:80'
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4:latest
    env_file: .env
    ports:
      - '5050:80'
    depends_on:
      - db

volumes:
  db_data:
